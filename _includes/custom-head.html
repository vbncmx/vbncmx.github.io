<style>
  .mermaid {
    margin: 1rem 0;
    text-align: center;
  }

  .mermaid svg {
    max-width: 100%;
    height: auto;
  }
</style>

<script type="module">
  const MERMAID_CDN =
    "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
  const MERMAID_LOCAL = "{{ '/assets/js/mermaid.min.js' | relative_url }}";

  const loadMermaidFromGitHubPages = () =>
    new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = MERMAID_LOCAL;
      script.async = true;
      script.onload = () => resolve(globalThis.mermaid);
      script.onerror = () =>
        reject(new Error("Failed to load local Mermaid bundle from site assets"));
      document.head.appendChild(script);
    });

  const loadMermaid = async () => {
    try {
      return (await import(MERMAID_CDN)).default;
    } catch (error) {
      console.warn(
        "Mermaid CDN unavailable, loading copy bundled with the site (GitHub Pages):",
        error
      );
      return loadMermaidFromGitHubPages();
    }
  };

  const renderMermaidDiagrams = async (mermaid) => {
    mermaid.initialize({
      startOnLoad: false,
      securityLevel: "loose"
    });

    const codeBlocks = document.querySelectorAll("pre > code.language-mermaid");

    for (const codeBlock of codeBlocks) {
      const pre = codeBlock.parentElement;
      if (!pre || pre.dataset.mermaidProcessed === "true") {
        continue;
      }

      const diagram = document.createElement("div");
      diagram.className = "mermaid";
      diagram.textContent = codeBlock.textContent || "";

      pre.dataset.mermaidProcessed = "true";
      pre.replaceWith(diagram);
    }

    await mermaid.run({
      querySelector: ".mermaid"
    });
  };

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      const mermaid = await loadMermaid();
      await renderMermaidDiagrams(mermaid);
    } catch (error) {
      console.error("Mermaid could not be loaded:", error);
    }
  });
</script>
